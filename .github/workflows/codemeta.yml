on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'DESCRIPTION'
      - '**codemeta.yml'

name: codemeta
      
jobs:
  codemeta:
    runs-on: ubuntu-24.04-arm
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      
    steps:
      - uses: ms609/actions/codemeta@main
